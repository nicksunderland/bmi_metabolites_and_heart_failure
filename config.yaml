# slurm settings bp1-compute009 bp1-compute100
use-singularity: True
singularity-args: "-B $DATA_DIR:$DATA_DIR,$DBSNP_DIR:$DBSNP_DIR,$METAB_DIR:$METAB_DIR,$PROJ_DIR:$PROJ_DIR"
use-conda: True
cluster-cancel: scancel %j
cluster:
  sbatch
    --partition=short,compute,test
    --account=$SLURM_ACCOUNT  
    --exclude=bp1-compute104,bp1-compute133,bp1-compute136,bp1-compute138,bp1-compute140,bp1-compute157,bp1-compute159,bp1-compute061,bp1-compute165,bp1-compute082,bp1-compute124,bp1-compute081,bp1-compute064,bp1-compute131,bp1-compute070 
    --nodes={resources.nodes}
    --ntasks-per-node={resources.ntasks_per_node}
    --cpus-per-task={resources.cpus_per_task}
    --time={resources.time}
    --mem={resources.mem_mb}
    --job-name={rule}-{wildcards}
    --output=$WORK/projects/bmi_metabolites_and_heart_failure/.snakemake/slurm_logs/rule_{rule}/%j_{rule}{wildcards}.out
default-resources:
  - time="01:00:00"
  - ntasks_per_node=1
  - nodes=1
  - cpus_per_task=1
  - mem_mb=10000
jobs: 100
restart-times: 0
max-jobs-per-second: 10
max-status-checks-per-second: 1
local-cores: 1
latency-wait: 10
keep-going: True
rerun-incomplete: True
printshellcmds: True
scheduler: greedy
